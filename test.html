<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safari ラジオボタン表示テスト</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="./test.css">
</head>

<body>

    <h4 class="tokyo_subsidy">Safari ラジオボタン表示テスト</h4>

    <div class="radio_group">

        <div>
            <input type="radio" id="test_radio_1" name="tokyoSubsidyType" value="facility" checked>
            <label class="radio_button" for="test_radio_1">ラジオボタンのテスト１</label>
            <img src="question.png" class="question pointer">
        </div>

        <div>
            <input type="radio" id="test_radio_2" name="tokyoSubsidyType" value="service">
            <label class="radio_button" for="test_radio_2">ラジオボタンのテスト２</label>
            <img src="question.png" class="question pointer">
        </div>

    </div>

</body>
</html>
